name: Refresh data snapshot

on:
  schedule:
    # Sundays at 06:00 UTC. Change this cron to alter cadence.
    - cron: "0 6 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh STATIC snapshot
        run: node scripts/refresh-snapshot.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add index.html international_finance_atlas.html
            git commit -m "chore: auto-refresh data snapshot ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes to commit."
          fi
